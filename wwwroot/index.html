<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker – Sign In</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
        }

        .brand-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            color: #fff;
            position: relative;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, .25) 0%, transparent 60%);
            pointer-events: none;
        }

        .brand-logo { font-size: 3rem; margin-bottom: 1rem; z-index: 1; }

        .brand-panel h1 {
            font-size: 2.5rem; font-weight: 800; line-height: 1.2;
            margin-bottom: 1rem; z-index: 1;
        }

        .brand-panel h1 span {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .brand-panel p {
            font-size: 1.1rem; color: rgba(255,255,255,.65);
            max-width: 420px; line-height: 1.7; z-index: 1;
        }

        .floating-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .floating-shapes .shape {
            position: absolute; border-radius: 50%; opacity: .08;
            background: #818cf8; animation: float 8s ease-in-out infinite;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; top: 10%; left: -5%; }
        .shape:nth-child(2) { width: 200px; height: 200px; bottom: 15%; right: 10%; animation-delay: 2s; }
        .shape:nth-child(3) { width: 150px; height: 150px; top: 60%; left: 30%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .login-panel {
            width: 480px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255,255,255,.08);
        }

        .login-card { width: 100%; max-width: 360px; padding: 2rem; text-align: center; }

        .login-card .icon {
            width: 72px; height: 72px; border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 2rem;
            box-shadow: 0 8px 32px rgba(99,102,241,.35);
        }

        .login-card h2 { color: #fff; font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
        .login-card .subtitle { color: rgba(255,255,255,.5); font-size: .9rem; margin-bottom: 2rem; }

        #google-btn { display: flex; justify-content: center; min-height: 44px; }

        #result { margin-top: 1.5rem; animation: fadeIn .4s ease; }

        .profile-card {
            background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
            border-radius: 16px; padding: 1.5rem;
            display: flex; align-items: center; gap: 1rem; text-align: left;
        }
        .profile-card img { width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(255,255,255,.15); }
        .profile-card .name { color: #fff; font-weight: 600; }
        .profile-card .email { color: rgba(255,255,255,.5); font-size: .85rem; }

        .btn-continue {
            margin-top: 1.25rem; width: 100%; padding: .85rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; border: none; border-radius: 12px;
            font-size: .95rem; font-weight: 600; cursor: pointer;
            transition: transform .15s, box-shadow .15s; font-family: inherit;
        }
        .btn-continue:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.4); }

        .btn-signout {
            margin-top: .75rem; background: none;
            border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.5);
            padding: .6rem; width: 100%; border-radius: 12px;
            cursor: pointer; font-size: .85rem; font-family: inherit;
            transition: background .15s, color .15s;
        }
        .btn-signout:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.8); }

        .error-msg {
            margin-top: 1rem; color: #f87171; font-size: .85rem;
            background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.15);
            border-radius: 10px; padding: .75rem;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .brand-panel { display: none; }
            .login-panel { width: 100%; border-left: none; }
        }
    </style>
</head>
<body>
    <div class="brand-panel">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="brand-logo">💰</div>
        <h1>Track every penny,<br/><span>effortlessly.</span></h1>
        <p>Manage your expenses, set budgets by category, and get clear insights into where your money goes — all in one beautiful dashboard.</p>
    </div>

    <div class="login-panel">
        <div class="login-card">
            <div class="icon">💰</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your expense tracker</p>

            <div id="google-btn"></div>

            <div id="result" class="hidden">
                <div class="profile-card" id="profile"></div>
                <button class="btn-continue" onclick="goToDashboard()">Open Dashboard →</button>
                <button class="btn-signout" onclick="logout()">Sign out</button>
            </div>

            <p id="error" class="error-msg hidden"></p>
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = '1007389871211-0f700ibkggf619d0f88725grj4s0ofes.apps.googleusercontent.com';
        const API_BASE = window.location.origin;

        (function checkSession() {
            const token = localStorage.getItem('et_token');
            if (token) window.location.href = 'dashboard.html';
        })();

        function handleCredentialResponse(response) {
            hideError();
            fetch(`${API_BASE}/api/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: response.credential })
            })
            .then(res => { if (!res.ok) throw new Error(`Authentication failed (${res.status})`); return res.json(); })
            .then(data => {
                localStorage.setItem('et_token', data.accessToken);
                localStorage.setItem('et_user', JSON.stringify({ name: data.name, email: data.email, picture: data.pictureUrl }));
                showProfile(data);
            })
            .catch(err => showError(err.message));
        }

        function showProfile(data) {
            document.getElementById('google-btn').classList.add('hidden');
            const pic = data.pictureUrl
                ? `<img src="${data.pictureUrl}" alt="" />`
                : `<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.2rem">${data.name[0]}</div>`;
            document.getElementById('profile').innerHTML = `${pic}<div><div class="name">${data.name}</div><div class="email">${data.email}</div></div>`;
            document.getElementById('result').classList.remove('hidden');
        }

        function goToDashboard() { window.location.href = 'dashboard.html'; }

        function logout() {
            localStorage.removeItem('et_token');
            localStorage.removeItem('et_user');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('google-btn').classList.remove('hidden');
            google.accounts.id.disableAutoSelect();
        }

        function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.classList.remove('hidden'); }
        function hideError() { document.getElementById('error').classList.add('hidden'); }

        window.onload = () => {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById('google-btn'), { theme: 'filled_black', size: 'large', text: 'signin_with', shape: 'pill', width: 300 });
        };
    </script>
</body>
</html>
